apiVersion: v1
kind: ServiceAccount
metadata:
  name: threadbot-sa
  namespace: threadbot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-pod-runner
  namespace: threadbot
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/attach", "pods/log"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: threadbot-mcp-pod-runner
  namespace: threadbot
subjects:
  - kind: ServiceAccount
    name: threadbot-sa
    namespace: threadbot
roleRef:
  kind: Role
  name: mcp-pod-runner
  apiGroup: rbac.authorization.k8s.io
