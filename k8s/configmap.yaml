apiVersion: v1
kind: ConfigMap
metadata:
  name: threadbot-config
  namespace: threadbot
data:
  # Database — external Postgres at 192.168.69.11
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@192.168.69.11:5432/threadbot"
  # Temporal — existing cluster-internal service
  TEMPORAL_HOST: "temporal-frontend.temporal.svc.cluster.local"
  TEMPORAL_PORT: "7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "chatbot-task-queue"
  # LLM defaults (overridable via Settings UI)
  LLM_API_URL: "http://192.168.69.35:11434/v1"
  LLM_API_KEY: "ollama"
  LLM_MODEL: "gemma4:e2b"
  LLM_TEMPERATURE: "1.0"
  LLM_MAX_TOKENS: "4096"
  # Server
  HOST: "0.0.0.0"
  PORT: "8000"
  # Redis — external Redis instance
  REDIS_URL: "redis://192.168.69.5:6379"
  REDIS_DB: "3"
