apiVersion: v1
kind: ConfigMap
metadata:
  name: threadbot-config
  namespace: threadbot
data:
  # Database — external Postgres (generated by deploy.sh)
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@POSTGRES_HOST:5432/threadbot"
  # Temporal — external service
  TEMPORAL_HOST: "temporal-frontend.temporal.svc.cluster.local"
  TEMPORAL_PORT: "7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "chatbot-task-queue"
  # LLM defaults (overridable via Settings UI)
  LLM_API_URL: "http://LLM_HOST:11434/v1"
  LLM_API_KEY: "ollama"
  LLM_MODEL: "llama3.1"
  LLM_TEMPERATURE: "0.7"
  LLM_MAX_TOKENS: "2048"
  # Server
  HOST: "0.0.0.0"
  PORT: "8000"
  # Redis — external Redis instance
  REDIS_URL: "redis://192.168.69.11:6379"
  REDIS_DB: "3"
