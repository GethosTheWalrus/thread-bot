apiVersion: v1
kind: ConfigMap
metadata:
  name: threadbot-config
  namespace: threadbot
data:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@threadbot-postgres:5432/chatbot"
  TEMPORAL_HOST: "temporal"
  TEMPORAL_PORT: "7233"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "chatbot-task-queue"
  LLM_API_URL: "http://llm-service:8000/v1"
  LLM_API_KEY: "ollama"
  LLM_MODEL: "llama3.1"
  LLM_TEMPERATURE: "0.7"
  LLM_MAX_TOKENS: "2048"
  HOST: "0.0.0.0"
  PORT: "8000"
