# ── Backend Deployment ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: threadbot-backend
  namespace: threadbot
  labels:
    app: threadbot-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: threadbot-backend
  template:
    metadata:
      labels:
        app: threadbot-backend
    spec:
      serviceAccountName: threadbot-sa
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: backend
          image: git.home:5050/mike/thread-bot/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: threadbot-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: threadbot-backend
  namespace: threadbot
spec:
  selector:
    app: threadbot-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
# ── Worker Deployment ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: threadbot-worker
  namespace: threadbot
  labels:
    app: threadbot-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: threadbot-worker
  template:
    metadata:
      labels:
        app: threadbot-worker
    spec:
      serviceAccountName: threadbot-sa
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: worker
          image: git.home:5050/mike/thread-bot/worker:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.worker"]
          envFrom:
            - configMapRef:
                name: threadbot-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# ── Frontend Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: threadbot-frontend
  namespace: threadbot
  labels:
    app: threadbot-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: threadbot-frontend
  template:
    metadata:
      labels:
        app: threadbot-frontend
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: frontend
          image: git.home:5050/mike/thread-bot/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: threadbot-frontend
  namespace: threadbot
spec:
  selector:
    app: threadbot-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
# ── LoadBalancer (MetalLB) — single entrypoint via nginx proxy ─────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: threadbot-proxy
  namespace: threadbot
  labels:
    app: threadbot-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: threadbot-proxy
  template:
    metadata:
      labels:
        app: threadbot-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: nginx-config
          configMap:
            name: threadbot-proxy-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: threadbot-proxy-config
  namespace: threadbot
data:
  default.conf: |
    upstream backend {
        server threadbot-backend.threadbot.svc.cluster.local:80;
    }
    upstream frontend {
        server threadbot-frontend.threadbot.svc.cluster.local:80;
    }
    server {
        listen 80;
        server_name _;

        # Backend API and health
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            # SSE streaming support
            proxy_read_timeout 300s;
        }
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Frontend SPA
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: threadbot-lb
  namespace: threadbot
spec:
  type: LoadBalancer
  selector:
    app: threadbot-proxy
  ports:
    - port: 80
      targetPort: 80
