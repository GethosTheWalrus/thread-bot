stages:
  - build
  - update-manifests

variables:
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  REGISTRY_IMAGE: "$CI_REGISTRY_IMAGE"
  BUILDX_PLATFORMS: "linux/amd64,linux/arm64"
  BACKEND_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/backend:buildcache"
  FRONTEND_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/frontend:buildcache"
  REACHY_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/reachy:buildcache"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[skip ci\]/'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

build-backend-images:
  stage: build
  image: docker:27
  rules:
    - changes:
        - backend/**/*
        - frontend/**/*
        - docker/**/*
        - docker-compose.yml
        - .gitlab-ci.yml
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - printf '[registry."%s"]\n  http = true\n  insecure = true\n' "$CI_REGISTRY" > /tmp/buildkitd.toml
    - docker buildx create --use --name "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID" --driver docker-container --config /tmp/buildkitd.toml
    - docker buildx inspect --bootstrap
  script:
    - docker buildx build --platform "$BUILDX_PLATFORMS" --cache-from type=registry,ref="$BACKEND_CACHE_IMAGE" --cache-to type=registry,ref="$BACKEND_CACHE_IMAGE",mode=max -t "$REGISTRY_IMAGE/backend:$IMAGE_TAG" -t "$REGISTRY_IMAGE/backend:latest" -t "$REGISTRY_IMAGE/worker:$IMAGE_TAG" -t "$REGISTRY_IMAGE/worker:latest" --push ./backend
  after_script:
    - docker buildx rm "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID" || true

build-frontend-image:
  stage: build
  image: docker:27
  rules:
    - changes:
        - frontend/**/*
        - docker/**/*
        - docker-compose.yml
        - .gitlab-ci.yml
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - printf '[registry."%s"]\n  http = true\n  insecure = true\n' "$CI_REGISTRY" > /tmp/buildkitd.toml
    - docker buildx create --use --name "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID-frontend" --driver docker-container --config /tmp/buildkitd.toml
    - docker buildx inspect --bootstrap
  script:
    - docker buildx build --platform "$BUILDX_PLATFORMS" --cache-from type=registry,ref="$FRONTEND_CACHE_IMAGE" --cache-to type=registry,ref="$FRONTEND_CACHE_IMAGE",mode=max -f docker/Dockerfile.frontend -t "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" -t "$REGISTRY_IMAGE/frontend:latest" --push ./frontend
  after_script:
    - docker buildx rm "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID-frontend" || true

build-reachy-image:
  stage: build
  image: docker:27
  rules:
    - changes:
        - backend/requirements-reachy.txt
        - backend/app/reachy*
        - backend/app/activities/**
        - backend/app/workflows/**
        - backend/app/models/**
        - backend/app/config.py
        - backend/app/database/**
        - backend/app/encryption.py
        - backend/app/mcp_helper.py
        - docker/Dockerfile.reachy
        - docker-compose.yml
        - .gitlab-ci.yml
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - printf '[registry."%s"]\n  http = true\n  insecure = true\n' "$CI_REGISTRY" > /tmp/buildkitd.toml
    - docker buildx create --use --name "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID-reachy" --driver docker-container --config /tmp/buildkitd.toml
    - docker buildx inspect --bootstrap
  script:
    - docker buildx build --platform "$BUILDX_PLATFORMS" --cache-from type=registry,ref="$REACHY_CACHE_IMAGE" --cache-to type=registry,ref="$REACHY_CACHE_IMAGE",mode=max -f docker/Dockerfile.reachy -t "$REGISTRY_IMAGE/reachy:$IMAGE_TAG" -t "$REGISTRY_IMAGE/reachy:latest" --push ./backend
  after_script:
    - docker buildx rm "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID-reachy" || true

update-k8s-images:
  stage: update-manifests
  image: docker:27
  needs:
    - job: build-backend-images
      optional: true
    - job: build-frontend-image
      optional: true
    - job: build-reachy-image
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - k8s/deployment.yaml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
        - frontend/**/*
        - docker/**/*
        - docker-compose.yml
        - .gitlab-ci.yml
  before_script:
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@$CI_SERVER_HOST"
  script:
    - |
      # Stamp only the image groups whose build jobs run for this commit's
      # changed paths. Avoid GitLab registry API calls so HTTP-only GitLab
      # instances do not fail this job while checking for pushed tags.
      changed_files=$(git diff --name-only "${CI_COMMIT_BEFORE_SHA:-}" "$CI_COMMIT_SHA" 2>/dev/null || true)
      if [ -z "$changed_files" ]; then
        changed_files=$(git show --name-only --format= "$CI_COMMIT_SHA")
      fi
      printf '%s\n' "$changed_files"

      path_changed() {
        printf '%s\n' "$changed_files" | grep -Eq "$1"
      }

      want_backend=0
      want_frontend=0
      want_reachy=0
      if path_changed '^(backend/|frontend/|docker/|docker-compose\.yml$|\.gitlab-ci\.yml$)'; then
        want_backend=1
      fi
      if path_changed '^(frontend/|docker/|docker-compose\.yml$|\.gitlab-ci\.yml$)'; then
        want_frontend=1
      fi
      if path_changed '^(backend/requirements-reachy\.txt|backend/app/reachy|backend/app/activities|backend/app/workflows|backend/app/models|backend/app/config\.py|backend/app/database|backend/app/encryption\.py|backend/app/mcp_helper\.py|docker/Dockerfile\.reachy|docker-compose\.yml$|\.gitlab-ci\.yml$)'; then
        want_reachy=1
      fi

      changed=0
      if [ "$want_backend" = "1" ]; then
        sed -i -E "s|image: .*/backend:.*|image: $REGISTRY_IMAGE/backend:$IMAGE_TAG|" k8s/deployment.yaml
        sed -i -E "s|image: .*/worker:.*|image: $REGISTRY_IMAGE/worker:$IMAGE_TAG|" k8s/deployment.yaml
        changed=1
      fi
      if [ "$want_frontend" = "1" ]; then
        sed -i -E "s|image: .*/frontend:.*|image: $REGISTRY_IMAGE/frontend:$IMAGE_TAG|" k8s/deployment.yaml
        changed=1
      fi
      if [ "$want_reachy" = "1" ]; then
        sed -i -E "s|image: .*/reachy:.*|image: $REGISTRY_IMAGE/reachy:$IMAGE_TAG|" k8s/deployment.yaml
        changed=1
      fi
      if [ "$changed" = "0" ]; then
        echo "No images built for $IMAGE_TAG; leaving manifest unchanged."
        exit 0
      fi
      git add k8s/deployment.yaml
      if git diff --cached --quiet; then exit 0; fi
      git commit -m "chore: update threadbot images to $IMAGE_TAG [skip ci]"
      git push "${CI_SERVER_PROTOCOL}://oauth2:${CI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:main"
