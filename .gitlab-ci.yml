stages:
  - build
  - update-manifests

variables:
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  REGISTRY_IMAGE: "$CI_REGISTRY_IMAGE"
  BUILDX_PLATFORMS: "linux/amd64,linux/arm64"
  BACKEND_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/backend:buildcache"
  FRONTEND_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/frontend:buildcache"

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[skip ci\]/'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

build-backend-images:
  stage: build
  image: docker:27
  rules:
    - changes:
        - backend/**/*
        - frontend/**/*
        - docker/**/*
        - docker-compose.yml
        - .gitlab-ci.yml
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - printf '[registry."%s"]\n  http = true\n  insecure = true\n' "$CI_REGISTRY" > /tmp/buildkitd.toml
    - docker buildx create --use --name "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID" --driver docker-container --config /tmp/buildkitd.toml
    - docker buildx inspect --bootstrap
  script:
    - docker buildx build --platform "$BUILDX_PLATFORMS" --cache-from type=registry,ref="$BACKEND_CACHE_IMAGE" --cache-to type=registry,ref="$BACKEND_CACHE_IMAGE",mode=max -t "$REGISTRY_IMAGE/backend:$IMAGE_TAG" -t "$REGISTRY_IMAGE/worker:$IMAGE_TAG" --push ./backend
  after_script:
    - docker buildx rm "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID" || true

build-frontend-image:
  stage: build
  image: docker:27
  rules:
    - changes:
        - frontend/**/*
        - docker/**/*
        - docker-compose.yml
        - .gitlab-ci.yml
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - printf '[registry."%s"]\n  http = true\n  insecure = true\n' "$CI_REGISTRY" > /tmp/buildkitd.toml
    - docker buildx create --use --name "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID-frontend" --driver docker-container --config /tmp/buildkitd.toml
    - docker buildx inspect --bootstrap
  script:
    - docker buildx build --platform "$BUILDX_PLATFORMS" --cache-from type=registry,ref="$FRONTEND_CACHE_IMAGE" --cache-to type=registry,ref="$FRONTEND_CACHE_IMAGE",mode=max -f docker/Dockerfile.frontend -t "$REGISTRY_IMAGE/frontend:$IMAGE_TAG" --push ./frontend
  after_script:
    - docker buildx rm "threadbot-builder-$CI_PROJECT_ID-$CI_PIPELINE_ID-frontend" || true

update-k8s-images:
  stage: update-manifests
  image: alpine:3.20
  needs:
    - job: build-backend-images
      optional: true
    - job: build-frontend-image
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - k8s/deployment.yaml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
        - frontend/**/*
        - docker/**/*
        - docker-compose.yml
        - .gitlab-ci.yml
  before_script:
    - apk add --no-cache git
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@$CI_SERVER_HOST"
  script:
    - |
      # Only point the manifest at $IMAGE_TAG if a build actually produced that
      # tag in the registry for each kind. If no build ran for this commit, the
      # tag does not exist and we must not stamp it (would leave pods referencing
      # a non-existent image).
      backend_image_repo=$(printf %s "$REGISTRY_IMAGE/backend" | sed -E 's|.*/||')
      frontend_image_repo=$(printf %s "$REGISTRY_IMAGE/frontend" | sed -E 's|.*/||')
      api="https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/registry/repositories"

      has_tag() {
        local repo="$1" tag="$2"
        curl -sS -u "gitlab-ci-token:${CI_JOB_TOKEN}" \
          "${api}/${repo}/tags?search=${tag}" \
          | grep -q "\"name\":\"${tag}\""
      }

      want_backend=0
      want_frontend=0
      if has_tag "$backend_image_repo" "$IMAGE_TAG"; then
        want_backend=1
      fi
      if has_tag "$frontend_image_repo" "$IMAGE_TAG"; then
        want_frontend=1
      fi

      changed=0
      if [ "$want_backend" = "1" ]; then
        sed -i -E "s|image: .*/backend:.*|image: $REGISTRY_IMAGE/backend:$IMAGE_TAG|" k8s/deployment.yaml
        sed -i -E "s|image: .*/worker:.*|image: $REGISTRY_IMAGE/worker:$IMAGE_TAG|" k8s/deployment.yaml
        changed=1
      fi
      if [ "$want_frontend" = "1" ]; then
        sed -i -E "s|image: .*/frontend:.*|image: $REGISTRY_IMAGE/frontend:$IMAGE_TAG|" k8s/deployment.yaml
        changed=1
      fi
      if [ "$changed" = "0" ]; then
        echo "No images built for $IMAGE_TAG; leaving manifest unchanged."
        exit 0
      fi
      git add k8s/deployment.yaml
      if git diff --cached --quiet; then exit 0; fi
      git commit -m "chore: update threadbot images to $IMAGE_TAG [skip ci]"
      git push "${CI_SERVER_PROTOCOL}://oauth2:${CI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:main"
