<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="threadbot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>threadbot</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script>
    window.initPolyBot = function(container) {
      if (!container) {
        console.error("PolyBot: No container provided");
        return;
      }

      // Check if already initialized
      if (container.dataset.initialized) return;
      container.dataset.initialized = "true";

      const hideNeedle = container.dataset.hideNeedle === "true";
      const zoom = parseFloat(container.dataset.zoom) || 4.0;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      
      const width = container.clientWidth || 200;
      const height = container.clientHeight || 200;
      renderer.setSize(width, height);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambientLight);
      
      const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
      mainLight.position.set(5, 5, 10);
      scene.add(mainLight);

      const accentLight = new THREE.PointLight(0x8B5CF6, 15, 30);
      accentLight.position.set(-2, 4, 5);
      scene.add(accentLight);

      const rimLight = new THREE.PointLight(0xffffff, 5, 20);
      rimLight.position.set(-5, 2, -5);
      scene.add(rimLight);

      // Mascot Group
      const botGroup = new THREE.Group();
      scene.add(botGroup);

      // --- Materials ---
      const metalMat = new THREE.MeshStandardMaterial({ 
        color: 0x1a1a24, 
        roughness: 0.6,
        metalness: 0.8,
      });
      const darkMetalMat = new THREE.MeshStandardMaterial({ 
        color: 0x111116, 
        roughness: 0.8,
        metalness: 0.5,
      });
      const shinyMetalMat = new THREE.MeshStandardMaterial({ 
        color: 0xaaaaaa, 
        roughness: 0.2,
        metalness: 1.0,
      });
      const glowMat = new THREE.MeshBasicMaterial({ color: 0x8B5CF6, transparent: true, opacity: 0.9 });
      const secondaryMetal = new THREE.MeshStandardMaterial({ 
        color: 0x2a2a35,
        roughness: 0.5,
        metalness: 0.7,
      });

      // --- Head Chassis (More Detailed) ---
      // Main block
      const headGeo = new THREE.BoxGeometry(1.6, 1.4, 1.3);
      const head = new THREE.Mesh(headGeo, metalMat);
      botGroup.add(head);

      // Top bevel/panel
      const topPanelGeo = new THREE.BoxGeometry(1.4, 0.1, 1.1);
      const topPanel = new THREE.Mesh(topPanelGeo, darkMetalMat);
      topPanel.position.set(0, 0.72, 0);
      botGroup.add(topPanel);

      // Bottom bevel/panel
      const bottomPanelGeo = new THREE.BoxGeometry(1.4, 0.1, 1.1);
      const bottomPanel = new THREE.Mesh(bottomPanelGeo, darkMetalMat);
      bottomPanel.position.set(0, -0.72, 0);
      botGroup.add(bottomPanel);

      // Back heatsink ribs
      const heatsinkGeo = new THREE.BoxGeometry(1.2, 1.0, 0.1);
      const heatsink = new THREE.Mesh(heatsinkGeo, secondaryMetal);
      heatsink.position.set(0, 0, -0.66);
      botGroup.add(heatsink);

      // --- Face Plate (Recessed with details) ---
      const faceGroup = new THREE.Group();
      faceGroup.position.z = 0.66;
      botGroup.add(faceGroup);

      // Outer bezel
      const faceBezelGeo = new THREE.BoxGeometry(1.4, 0.9, 0.05);
      const faceBezel = new THREE.Mesh(faceBezelGeo, darkMetalMat);
      faceGroup.add(faceBezel);

      // Inner screen
      const faceScreenGeo = new THREE.PlaneGeometry(1.3, 0.8);
      const faceScreenMat = new THREE.MeshPhongMaterial({ 
        color: 0x050508,
        shininess: 100,
        specular: 0x222233
      });
      const faceScreen = new THREE.Mesh(faceScreenGeo, faceScreenMat);
      faceScreen.position.z = 0.03;
      faceGroup.add(faceScreen);

      // Grid pattern / scanlines on screen
      const gridGeo = new THREE.PlaneGeometry(1.3, 0.8, 13, 8);
      const gridMat = new THREE.MeshBasicMaterial({ 
        color: 0x8B5CF6, 
        wireframe: true, 
        transparent: true, 
        opacity: 0.05 
      });
      const grid = new THREE.Mesh(gridGeo, gridMat);
      grid.position.z = 0.031;
      faceGroup.add(grid);

      // --- Eyes (More mechanical) ---
      // Left Eye
      const eyeHousingGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.04, 16);
      const leftEyeHousing = new THREE.Mesh(eyeHousingGeo, shinyMetalMat);
      leftEyeHousing.rotation.x = Math.PI / 2;
      leftEyeHousing.position.set(-0.35, 0.05, 0.03);
      faceGroup.add(leftEyeHousing);

      const eyeGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.05, 16);
      const leftEye = new THREE.Mesh(eyeGeo, glowMat);
      leftEye.rotation.x = Math.PI / 2;
      leftEye.position.set(-0.35, 0.05, 0.04);
      faceGroup.add(leftEye);

      // Right Eye
      const rightEyeHousing = new THREE.Mesh(eyeHousingGeo, shinyMetalMat);
      rightEyeHousing.rotation.x = Math.PI / 2;
      rightEyeHousing.position.set(0.35, 0.05, 0.03);
      faceGroup.add(rightEyeHousing);

      const rightEye = new THREE.Mesh(eyeGeo, glowMat);
      rightEye.rotation.x = Math.PI / 2;
      rightEye.position.set(0.35, 0.05, 0.04);
      faceGroup.add(rightEye);

      // Eye Glow (Larger, transparent)
      const eyeGlowGeo = new THREE.CircleGeometry(0.3, 16);
      const eyeGlowMat = new THREE.MeshBasicMaterial({ color: 0x8B5CF6, transparent: true, opacity: 0.2 });
      const leftGlow = new THREE.Mesh(eyeGlowGeo, eyeGlowMat);
      leftGlow.position.set(-0.35, 0.05, 0.06);
      faceGroup.add(leftGlow);
      const rightGlow = new THREE.Mesh(eyeGlowGeo, eyeGlowMat);
      rightGlow.position.set(0.35, 0.05, 0.06);
      faceGroup.add(rightGlow);

      // --- Status Aperture / Sensor ---
      const apertureGroup = new THREE.Group();
      apertureGroup.position.set(0.55, 0.35, 0.03);
      faceGroup.add(apertureGroup);

      const ledHousingGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.02, 12);
      const ledHousing = new THREE.Mesh(ledHousingGeo, shinyMetalMat);
      ledHousing.rotation.x = Math.PI / 2;
      apertureGroup.add(ledHousing);

      // Dark lens glass
      const lensGlassGeo = new THREE.SphereGeometry(0.04, 12, 12);
      const lensGlassMat = new THREE.MeshStandardMaterial({ 
        color: 0x050505, 
        roughness: 0, 
        metalness: 1.0 
      });
      const lensGlass = new THREE.Mesh(lensGlassGeo, lensGlassMat);
      lensGlass.position.z = 0.01;
      apertureGroup.add(lensGlass);

      // Pulsing Cyan Iris
      const irisGeo = new THREE.CircleGeometry(0.025, 12);
      const irisMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
      const iris = new THREE.Mesh(irisGeo, irisMat);
      iris.position.z = 0.025;
      apertureGroup.add(iris);

      // Pinpoint reflection
      const reflectGeo = new THREE.CircleGeometry(0.008, 6);
      const reflectMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const reflect = new THREE.Mesh(reflectGeo, reflectMat);
      reflect.position.set(0.01, 0.01, 0.026);
      apertureGroup.add(reflect);

      // --- Ears / Side Vents (More Detailed) ---
      const earGroupLeft = new THREE.Group();
      earGroupLeft.position.set(-0.82, 0, 0);
      botGroup.add(earGroupLeft);

      const earBaseGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.1, 16);
      const earBaseL = new THREE.Mesh(earBaseGeo, darkMetalMat);
      earBaseL.rotation.z = Math.PI / 2;
      earGroupLeft.add(earBaseL);

      const earVentGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 12);
      const earVentL = new THREE.Mesh(earVentGeo, shinyMetalMat);
      earVentL.rotation.z = Math.PI / 2;
      earVentL.position.x = -0.05;
      earGroupLeft.add(earVentL);

      const earInnerGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.16, 8);
      const earInnerL = new THREE.Mesh(earInnerGeo, glowMat);
      earInnerL.rotation.z = Math.PI / 2;
      earInnerL.position.x = -0.05;
      earGroupLeft.add(earInnerL);

      const earGroupRight = new THREE.Group();
      earGroupRight.position.set(0.82, 0, 0);
      botGroup.add(earGroupRight);

      const earBaseR = new THREE.Mesh(earBaseGeo, darkMetalMat);
      earBaseR.rotation.z = Math.PI / 2;
      earGroupRight.add(earBaseR);

      const earVentR = new THREE.Mesh(earVentGeo, shinyMetalMat);
      earVentR.rotation.z = Math.PI / 2;
      earVentR.position.x = 0.05;
      earGroupRight.add(earVentR);

      const earInnerR = new THREE.Mesh(earInnerGeo, glowMat);
      earInnerR.rotation.z = Math.PI / 2;
      earInnerR.position.x = 0.05;
      earGroupRight.add(earInnerR);

      // --- Antenna (More Mechanical) ---
      const antennaGroup = new THREE.Group();
      antennaGroup.position.set(0.4, 0.72, -0.2);
      antennaGroup.rotation.z = -0.2;
      botGroup.add(antennaGroup);

      const antMountGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.05, 8);
      const antMount = new THREE.Mesh(antMountGeo, darkMetalMat);
      antennaGroup.add(antMount);

      const antBaseGeoNew = new THREE.CylinderGeometry(0.04, 0.08, 0.4, 8);
      const antennaPole = new THREE.Mesh(antBaseGeoNew, shinyMetalMat);
      antennaPole.position.y = 0.2;
      antennaGroup.add(antennaPole);

      const antMidGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.05, 8);
      const antMid = new THREE.Mesh(antMidGeo, secondaryMetal);
      antMid.position.y = 0.4;
      antennaGroup.add(antMid);

      const antTipGeoNew = new THREE.SphereGeometry(0.08, 12, 12);
      const antTip = new THREE.Mesh(antTipGeoNew, glowMat);
      antTip.position.y = 0.48;
      antennaGroup.add(antTip);

      // --- Neck Joint (Hydraulic look) ---
      const neckGroup = new THREE.Group();
      neckGroup.position.y = -0.72;
      botGroup.add(neckGroup);

      const neckCollarGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.1, 16);
      const neckCollar = new THREE.Mesh(neckCollarGeo, darkMetalMat);
      neckGroup.add(neckCollar);

      const neckCoreGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.5, 12);
      const neckCore = new THREE.Mesh(neckCoreGeo, shinyMetalMat);
      neckCore.position.y = -0.25;
      neckGroup.add(neckCore);

      const neckPistonGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8);
      const pistonL = new THREE.Mesh(neckPistonGeo, secondaryMetal);
      pistonL.position.set(-0.2, -0.25, 0.2);
      neckGroup.add(pistonL);

      const pistonR = new THREE.Mesh(neckPistonGeo, secondaryMetal);
      pistonR.position.set(0.2, -0.25, 0.2);
      neckGroup.add(pistonR);

      // --- Needle ---

      const needleGroup = new THREE.Group();
      const needleMat = new THREE.MeshPhongMaterial({ 
        color: 0xffffff, // Brighter white metal
        shininess: 250,
        specular: 0xffffff
      });
      // Tapered needle: Thicker at bottom (eye), Thinner at top (point)
      const nBody = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.05, 1.5, 8), needleMat);
      const nTip = new THREE.Mesh(new THREE.CylinderGeometry(0.001, 0.01, 0.4, 8), needleMat);
      nTip.position.y = 0.95;
      const nEye = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.02, 8, 16), needleMat);
      nEye.position.y = -0.75;
      needleGroup.add(nBody);
      needleGroup.add(nTip);
      needleGroup.add(nEye);
      
      // Cyan light at the tip to distinguish from purple thread
      const needleLight = new THREE.PointLight(0x00ffff, 3, 4);
      needleLight.position.set(0, 1.1, 0);
      needleGroup.add(needleLight);

      needleGroup.visible = !hideNeedle;
      scene.add(needleGroup);

      // --- Thread ---
      const threadSegmentCount = 100;
      const threadPoints = [];
      for(let i = 0; i < threadSegmentCount; i++) threadPoints.push(new THREE.Vector3());
      const threadGeo = new THREE.BufferGeometry().setFromPoints(threadPoints);
      const threadLineMat = new THREE.LineBasicMaterial({ 
        color: 0x8B5CF6, 
        transparent: true, 
        opacity: 0.8,
        linewidth: 2
      });
      const threadLine = new THREE.Line(threadGeo, threadLineMat);
      threadLine.visible = !hideNeedle;
      scene.add(threadLine);

      // Set camera Z from data-zoom attribute
      camera.position.z = zoom;

      // Mouse tracking
      let targetRotationX = 0;
      let targetRotationY = 0;
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) - 0.5;
        const y = (e.clientY / window.innerHeight) - 0.5;
        targetRotationY = x * 0.6;
        targetRotationX = y * 0.4;
      });

      function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.001;

        // Idle hover
        botGroup.position.y = Math.sin(time) * 0.12;
        botGroup.rotation.z = Math.sin(time * 0.5) * 0.03;

        // Smooth follow
        botGroup.rotation.x += (targetRotationX - botGroup.rotation.x) * 0.06;
        botGroup.rotation.y += (targetRotationY - botGroup.rotation.y) * 0.06;

        // Eye flicker and antenna pulse
        glowMat.opacity = 0.7 + Math.sin(time * 5) * 0.3;
        eyeGlowMat.opacity = 0.15 + Math.sin(time * 5) * 0.1;
        irisMat.opacity = 0.5 + Math.sin(time * 3) * 0.3; // Soft cyan pulse

        // Subtle antenna jiggle
        antennaGroup.rotation.x = Math.sin(time * 10) * 0.02;
        antTip.position.x = Math.sin(time * 10) * 0.01;

        if (!hideNeedle) {
          // Update Thread Geometry (Downward Spiral + Needle at Bottom)
          const threadPositions = threadGeo.attributes.position.array;
          const headPos = new THREE.Vector3();
          head.getWorldPosition(headPos);
          
          // Needle position (subtle drift closer to the bot)
          const needleTargetX = headPos.x + 0.7 + Math.sin(time * 0.7) * 0.2;
          const needleTargetY = headPos.y - 1.2 + Math.cos(time * 0.4) * 0.1;
          const needleTargetZ = headPos.z + 0.8 + Math.sin(time * 0.3) * 0.3;
          
          needleGroup.position.set(needleTargetX, needleTargetY, needleTargetZ);
          // Pointing left and slightly down
          needleGroup.rotation.z = Math.PI * 0.7 + Math.sin(time * 0.5) * 0.1;
          needleGroup.rotation.x = Math.PI / 4 + Math.cos(time * 0.4) * 0.1;

          const eyeWorldPos = new THREE.Vector3();
          nEye.getWorldPosition(eyeWorldPos);

          for (let i = 0; i < threadSegmentCount; i++) {
            const t = i / (threadSegmentCount - 1);
            
            // Spiral path around the robot head
            const wraps = 2.5; // Loosened from 4.5
            const angle = t * Math.PI * 2 * wraps + time * 0.2;
            const spiralRadius = 1.7 + Math.sin(time * 0.3 + t * 4) * 0.05; // Increased from 1.3
            
            // Spiral from top of head down to a point below head
            let sx = headPos.x + Math.cos(angle) * spiralRadius;
            let sy = headPos.y + (1.0 - t * 2.0);
            let sz = headPos.z + Math.sin(angle) * spiralRadius;

            // Wind effect
            const windX = Math.sin(time * 1.8 + i * 0.15) * 0.12;
            const windY = Math.cos(time * 1.2 + i * 0.1) * 0.08;
            
            // Transition from the spiral wrap to the needle eye
            // Most of the thread follows the spiral, the very end (t > 0.8) connects to needle
            const blendStart = 0.75;
            let connectionFactor = 0;
            if (t > blendStart) {
              connectionFactor = Math.pow((t - blendStart) / (1 - blendStart), 2);
            }

            const finalX = sx * (1 - connectionFactor) + eyeWorldPos.x * connectionFactor + windX;
            const finalY = sy * (1 - connectionFactor) + eyeWorldPos.y * connectionFactor + windY;
            const finalZ = sz * (1 - connectionFactor) + eyeWorldPos.z * connectionFactor;

            threadPositions[i * 3] = finalX;
            threadPositions[i * 3 + 1] = finalY;
            threadPositions[i * 3 + 2] = finalZ;
          }
          threadGeo.attributes.position.needsUpdate = true;
        }

        renderer.render(scene, camera);
      }

      // Handle resize
      const resizeObserver = new ResizeObserver(() => {
        const width = container.clientWidth;
        const height = container.clientHeight;
        renderer.setSize(width, height);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      });
      resizeObserver.observe(container);

      animate();
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:

  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
