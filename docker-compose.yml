services:
  temporal:
    image: temporalio/auto-setup:1.31.0
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./backend/config/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.49.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    ports:
      - "8080:8080"
    networks:
      - chatbot-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/chatbot
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - chatbot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/chatbot
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - chatbot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - chatbot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  reachy-daemon:
    profiles: ["reachy"]
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.reachy
    command: reachy-mini-daemon
    network_mode: host
    privileged: true
    environment:
      - GST_PLUGIN_PATH=/opt/gst-plugins-rs/lib/x86_64-linux-gnu:/opt/gst-plugins-rs/lib64
      - LD_LIBRARY_PATH=/opt/gst-plugins-rs/lib64
      - PULSE_SERVER=${PULSE_SERVER:-unix:/tmp/pulse/native}
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /opt/gst-plugins-rs:/opt/gst-plugins-rs:ro
      - reachy-tmp:/tmp
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:/tmp/pulse/native
    restart: unless-stopped

  reachy-worker:
    profiles: ["reachy"]
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.reachy
    command: python -m app.reachy_worker
    network_mode: host
    privileged: true
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@192.168.69.11:5432/threadbot}
      - TEMPORAL_HOST=${TEMPORAL_HOST:-192.168.69.98}
      - TEMPORAL_PORT=${TEMPORAL_PORT:-7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_PAYLOAD_CODEC_ENABLED=${TEMPORAL_PAYLOAD_CODEC_ENABLED:-true}
      - TEMPORAL_PAYLOAD_CODEC_KEY=${TEMPORAL_PAYLOAD_CODEC_KEY:-}
      - TEMPORAL_PAYLOAD_CODEC_KEY_FILE=${TEMPORAL_PAYLOAD_CODEC_KEY_FILE:-}
      - REACHY_ENABLED=true
      - REACHY_DAEMON_URL=${REACHY_DAEMON_URL:-http://127.0.0.1:8000}
      - REACHY_TASK_QUEUE=${REACHY_TASK_QUEUE:-reachy-local}
      - REACHY_CONNECTION_MODE=${REACHY_CONNECTION_MODE:-}
      - REACHY_MEDIA_BACKEND=${REACHY_MEDIA_BACKEND:-default}
      - REACHY_CAMERA_MEDIA_BACKEND=${REACHY_CAMERA_MEDIA_BACKEND:-local}
      - REACHY_CAMERA_CAPTURE_MODE=${REACHY_CAMERA_CAPTURE_MODE:-ffmpeg}
      - REACHY_CAMERA_DEVICE=${REACHY_CAMERA_DEVICE:-}
      - REACHY_SPEECH_MEDIA_BACKEND=${REACHY_SPEECH_MEDIA_BACKEND:-default}
      - GST_PLUGIN_PATH=/opt/gst-plugins-rs/lib/x86_64-linux-gnu:/opt/gst-plugins-rs/lib64
      - LD_LIBRARY_PATH=/opt/gst-plugins-rs/lib64
      - PULSE_SERVER=${PULSE_SERVER:-unix:/tmp/pulse/native}
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /opt/gst-plugins-rs:/opt/gst-plugins-rs:ro
      - reachy-tmp:/tmp
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:/tmp/pulse/native
    restart: unless-stopped

  reachy-bridge:
    profiles: ["reachy"]
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.reachy
    command: sh -c "python -m app.reachy_bridge $${REACHY_BRIDGE_ARGS:---stdin}"
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@192.168.69.11:5432/threadbot}
      - TEMPORAL_HOST=${TEMPORAL_HOST:-192.168.69.98}
      - TEMPORAL_PORT=${TEMPORAL_PORT:-7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_PAYLOAD_CODEC_ENABLED=${TEMPORAL_PAYLOAD_CODEC_ENABLED:-true}
      - TEMPORAL_PAYLOAD_CODEC_KEY=${TEMPORAL_PAYLOAD_CODEC_KEY:-}
      - TEMPORAL_PAYLOAD_CODEC_KEY_FILE=${TEMPORAL_PAYLOAD_CODEC_KEY_FILE:-}
      - REACHY_ENABLED=true
      - REACHY_DAEMON_URL=${REACHY_DAEMON_URL:-http://127.0.0.1:8000}
      - REACHY_THREAD_ID=${REACHY_THREAD_ID:-}
      - REACHY_WAKE_WORD=${REACHY_WAKE_WORD:-Reachy}
      - REACHY_CONNECTION_MODE=${REACHY_CONNECTION_MODE:-}
      - REACHY_MEDIA_BACKEND=${REACHY_MEDIA_BACKEND:-default}
      - REACHY_CAMERA_MEDIA_BACKEND=${REACHY_CAMERA_MEDIA_BACKEND:-local}
      - REACHY_CAMERA_CAPTURE_MODE=${REACHY_CAMERA_CAPTURE_MODE:-ffmpeg}
      - REACHY_CAMERA_DEVICE=${REACHY_CAMERA_DEVICE:-}
      - REACHY_SPEECH_MEDIA_BACKEND=${REACHY_SPEECH_MEDIA_BACKEND:-default}
      - GST_PLUGIN_PATH=/opt/gst-plugins-rs/lib/x86_64-linux-gnu:/opt/gst-plugins-rs/lib64
      - LD_LIBRARY_PATH=/opt/gst-plugins-rs/lib64
      - PULSE_SERVER=${PULSE_SERVER:-unix:/tmp/pulse/native}
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /opt/gst-plugins-rs:/opt/gst-plugins-rs:ro
      - reachy-tmp:/tmp
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:/tmp/pulse/native
    restart: "no"

volumes:
  postgres-data:
  reachy-tmp:

networks:
  chatbot-network:
    driver: bridge
