services:
  temporal:
    image: temporalio/auto-setup:1.29.1
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./backend/config/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.49.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    ports:
      - "8080:8080"
    networks:
      - chatbot-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/chatbot
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - chatbot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/chatbot
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    networks:
      - chatbot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - chatbot-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  reachy-daemon:
    profiles: ["reachy"]
    image: ${REACHY_IMAGE:-reachy-local}
    build:
      context: .
      dockerfile: docker/Dockerfile.reachy
    command: sh -c "cp /etc/asound.conf /root/.asoundrc && amixer -c Audio cset numid=5 60,60 >/dev/null 2>&1 || true && amixer -c Audio cset numid=6 60 >/dev/null 2>&1 || true && exec nice -n -5 reachy-mini-daemon $${REACHY_DAEMON_ARGS:-}"
    network_mode: host
    privileged: true
    cpus: "${REACHY_DAEMON_CPUS:-2.0}"
    environment:
      - GST_PLUGIN_PATH=/usr/lib/gstreamer-1.0:/opt/gst-plugins-rs/lib/x86_64-linux-gnu:/opt/gst-plugins-rs/lib/aarch64-linux-gnu:/opt/gst-plugins-rs/lib64
      - LD_LIBRARY_PATH=/opt/gst-plugins-rs/lib64
      - PULSE_SERVER=${PULSE_SERVER:-unix:/tmp/pulse/native}
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /etc/asound.conf:/etc/asound.conf:ro
      - reachy-tmp:/tmp
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:/tmp/pulse
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  reachy-worker:
    profiles: ["reachy"]
    image: ${REACHY_IMAGE:-reachy-local}
    build:
      context: .
      dockerfile: docker/Dockerfile.reachy
    command: sh -c "cp /etc/asound.conf /root/.asoundrc && amixer -c Audio cset numid=5 60,60 >/dev/null 2>&1 || true && amixer -c Audio cset numid=6 60 >/dev/null 2>&1 || true && exec nice -n 5 python -m app.reachy_worker"
    network_mode: host
    privileged: true
    cpus: "${REACHY_WORKER_CPUS:-1.0}"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@192.168.69.11:5432/threadbot}
      - TEMPORAL_HOST=${TEMPORAL_HOST:-192.168.69.98}
      - TEMPORAL_PORT=${TEMPORAL_PORT:-7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - REACHY_BRIDGE_ARGS=${REACHY_BRIDGE_ARGS:---voice}
      - TEMPORAL_PAYLOAD_CODEC_ENABLED=${TEMPORAL_PAYLOAD_CODEC_ENABLED:-false}
      - TEMPORAL_PAYLOAD_CODEC_KEY=${TEMPORAL_PAYLOAD_CODEC_KEY:-}
      - TEMPORAL_PAYLOAD_CODEC_KEY_FILE=${TEMPORAL_PAYLOAD_CODEC_KEY_FILE:-}
      - REACHY_ENABLED=true
      - REACHY_DAEMON_URL=${REACHY_DAEMON_URL:-http://127.0.0.1:8000}
      - REACHY_TASK_QUEUE=${REACHY_TASK_QUEUE:-reachy-local}
      - REACHY_CONNECTION_MODE=${REACHY_CONNECTION_MODE:-}
      - REACHY_MEDIA_BACKEND=${REACHY_MEDIA_BACKEND:-default}
      - REACHY_CAMERA_MEDIA_BACKEND=${REACHY_CAMERA_MEDIA_BACKEND:-local}
      - REACHY_CAMERA_CAPTURE_MODE=${REACHY_CAMERA_CAPTURE_MODE:-ffmpeg}
      - REACHY_CAMERA_DEVICE=${REACHY_CAMERA_DEVICE:-}
      - REACHY_CAMERA_INPUT_FORMAT=${REACHY_CAMERA_INPUT_FORMAT:-mjpeg}
      - REACHY_CAMERA_VIDEO_SIZE=${REACHY_CAMERA_VIDEO_SIZE:-3840x2592}
      - REACHY_SPEECH_MEDIA_BACKEND=${REACHY_SPEECH_MEDIA_BACKEND:-default}
      - REACHY_OUTPUT_VOLUME=${REACHY_OUTPUT_VOLUME:-50}
      - REACHY_RESPONSE_MOOD=${REACHY_RESPONSE_MOOD:-helpful}
      - GST_PLUGIN_PATH=/usr/lib/gstreamer-1.0:/opt/gst-plugins-rs/lib/x86_64-linux-gnu:/opt/gst-plugins-rs/lib/aarch64-linux-gnu:/opt/gst-plugins-rs/lib64
      - LD_LIBRARY_PATH=/opt/gst-plugins-rs/lib64
      - PULSE_SERVER=${PULSE_SERVER:-unix:/tmp/pulse/native}
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /etc/asound.conf:/etc/asound.conf:ro
      - ./backend/app/reachy_client.py:/app/app/reachy_client.py:ro
      - reachy-tmp:/tmp
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:/tmp/pulse
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  reachy-bridge:
    profiles: ["reachy"]
    image: ${REACHY_IMAGE:-reachy-local}
    build:
      context: .
      dockerfile: docker/Dockerfile.reachy
    command: sh -c "cp /etc/asound.conf /root/.asoundrc && amixer -c Audio cset numid=5 60,60 >/dev/null 2>&1 || true && amixer -c Audio cset numid=6 60 >/dev/null 2>&1 || true && exec nice -n 10 python -m app.reachy_bridge $${REACHY_BRIDGE_ARGS:---voice}"
    network_mode: host
    privileged: true
    cpus: "${REACHY_BRIDGE_CPUS:-1.5}"
    stdin_open: true
    tty: true
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@192.168.69.11:5432/threadbot}
      - TEMPORAL_HOST=${TEMPORAL_HOST:-192.168.69.98}
      - TEMPORAL_PORT=${TEMPORAL_PORT:-7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_PAYLOAD_CODEC_ENABLED=${TEMPORAL_PAYLOAD_CODEC_ENABLED:-false}
      - TEMPORAL_PAYLOAD_CODEC_KEY=${TEMPORAL_PAYLOAD_CODEC_KEY:-}
      - TEMPORAL_PAYLOAD_CODEC_KEY_FILE=${TEMPORAL_PAYLOAD_CODEC_KEY_FILE:-}
      - REACHY_ENABLED=true
      - REACHY_DAEMON_URL=${REACHY_DAEMON_URL:-http://127.0.0.1:8000}
      - REACHY_THREAD_ID=${REACHY_THREAD_ID:-}
      - REACHY_WAKE_WORD=${REACHY_WAKE_WORD:-Reachy}
      - REACHY_CONNECTION_MODE=${REACHY_CONNECTION_MODE:-}
      - REACHY_MEDIA_BACKEND=${REACHY_MEDIA_BACKEND:-default}
      - REACHY_CAMERA_MEDIA_BACKEND=${REACHY_CAMERA_MEDIA_BACKEND:-local}
      - REACHY_CAMERA_CAPTURE_MODE=${REACHY_CAMERA_CAPTURE_MODE:-ffmpeg}
      - REACHY_CAMERA_DEVICE=${REACHY_CAMERA_DEVICE:-}
      - REACHY_CAMERA_INPUT_FORMAT=${REACHY_CAMERA_INPUT_FORMAT:-mjpeg}
      - REACHY_CAMERA_VIDEO_SIZE=${REACHY_CAMERA_VIDEO_SIZE:-3840x2592}
      - REACHY_SPEECH_MEDIA_BACKEND=${REACHY_SPEECH_MEDIA_BACKEND:-default}
      - REACHY_VOICE_SOURCE=${REACHY_VOICE_SOURCE:-reachy}
      - REACHY_VOICE_REACHY_BACKEND=${REACHY_VOICE_REACHY_BACKEND:-sdk}
      - REACHY_VOICE_REACHY_ASOUNDRC=${REACHY_VOICE_REACHY_ASOUNDRC:-false}
      - REACHY_VOICE_REACHY_REBOOT_AUDIO=${REACHY_VOICE_REACHY_REBOOT_AUDIO:-false}
      - REACHY_VOICE_PULSE_SOURCE=${REACHY_VOICE_PULSE_SOURCE:-alsa_input.usb-Pollen_Robotics_Reachy_Mini_Audio_100025004261401296-00.analog-stereo}
      - REACHY_VOICE_MODEL=${REACHY_VOICE_MODEL:-base.en}
      - REACHY_VOICE_DEVICE=${REACHY_VOICE_DEVICE:-cpu}
      - REACHY_VOICE_COMPUTE_TYPE=${REACHY_VOICE_COMPUTE_TYPE:-int8}
      - REACHY_VOICE_LANGUAGE=${REACHY_VOICE_LANGUAGE:-en}
      - REACHY_VOICE_INPUT_DEVICE=${REACHY_VOICE_INPUT_DEVICE:-alsa_input.usb-046d_Brio_101_2508AP9CQ4E8-02.mono-fallback}
      - REACHY_VOICE_SAMPLE_RATE=${REACHY_VOICE_SAMPLE_RATE:-16000}
      - REACHY_VOICE_PHRASE_SECONDS=${REACHY_VOICE_PHRASE_SECONDS:-5.0}
      - REACHY_VOICE_SILENCE_THRESHOLD=${REACHY_VOICE_SILENCE_THRESHOLD:-0.01}
      - REACHY_VOICE_UTTERANCE_MODE=${REACHY_VOICE_UTTERANCE_MODE:-true}
      - REACHY_VOICE_UTTERANCE_CHUNK_SECONDS=${REACHY_VOICE_UTTERANCE_CHUNK_SECONDS:-0.75}
      - REACHY_VOICE_UTTERANCE_END_SILENCE_SECONDS=${REACHY_VOICE_UTTERANCE_END_SILENCE_SECONDS:-1.4}
      - REACHY_VOICE_UTTERANCE_MAX_SECONDS=${REACHY_VOICE_UTTERANCE_MAX_SECONDS:-25.0}
      - REACHY_VOICE_UTTERANCE_START_TIMEOUT_SECONDS=${REACHY_VOICE_UTTERANCE_START_TIMEOUT_SECONDS:-6.0}
      - REACHY_VOICE_POST_WAKE_END_SILENCE_SECONDS=${REACHY_VOICE_POST_WAKE_END_SILENCE_SECONDS:-2.4}
      - REACHY_VOICE_POST_WAKE_START_TIMEOUT_SECONDS=${REACHY_VOICE_POST_WAKE_START_TIMEOUT_SECONDS:-12.0}
      - REACHY_VOICE_REACHY_SILENCE_FALLBACK_WINDOWS=${REACHY_VOICE_REACHY_SILENCE_FALLBACK_WINDOWS:-3}
      - REACHY_WAKE_DETECTOR=${REACHY_WAKE_DETECTOR:-transcript}
      - REACHY_OPENWAKEWORD_MODEL=${REACHY_OPENWAKEWORD_MODEL:-alexa}
      - REACHY_OPENWAKEWORD_THRESHOLD=${REACHY_OPENWAKEWORD_THRESHOLD:-0.5}
      - REACHY_OPENWAKEWORD_WINDOW_SECONDS=${REACHY_OPENWAKEWORD_WINDOW_SECONDS:-1.5}
      - REACHY_ROBOT_SLEEP_ON_IDLE=${REACHY_ROBOT_SLEEP_ON_IDLE:-true}
      - REACHY_POST_SPEECH_SLEEP_DELAY=${REACHY_POST_SPEECH_SLEEP_DELAY:-2.0}
      - REACHY_OUTPUT_VOLUME=${REACHY_OUTPUT_VOLUME:-50}
      - REACHY_RESPONSE_MOOD=${REACHY_RESPONSE_MOOD:-helpful}
      - REACHY_VOICE_LOG_CHUNKS=${REACHY_VOICE_LOG_CHUNKS:-false}
      - OMP_NUM_THREADS=${REACHY_BRIDGE_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${REACHY_BRIDGE_THREADS:-1}
      - MKL_NUM_THREADS=${REACHY_BRIDGE_THREADS:-1}
      - NUMEXPR_NUM_THREADS=${REACHY_BRIDGE_THREADS:-1}
      - VECLIB_MAXIMUM_THREADS=${REACHY_BRIDGE_THREADS:-1}
      - TOKENIZERS_PARALLELISM=false
      - GST_PLUGIN_PATH=/usr/lib/gstreamer-1.0:/opt/gst-plugins-rs/lib/x86_64-linux-gnu:/opt/gst-plugins-rs/lib/aarch64-linux-gnu:/opt/gst-plugins-rs/lib64
      - LD_LIBRARY_PATH=/opt/gst-plugins-rs/lib64
      - PULSE_SERVER=${PULSE_SERVER:-unix:/tmp/pulse/native}
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /etc/asound.conf:/etc/asound.conf:ro
      - ./backend/app/reachy_client.py:/app/app/reachy_client.py:ro
      - ./backend/app/reachy_bridge.py:/app/app/reachy_bridge.py:ro
      - reachy-tmp:/tmp
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:/tmp/pulse
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: "no"
volumes:
  postgres-data:
  reachy-tmp:

networks:
  chatbot-network:
    driver: bridge
